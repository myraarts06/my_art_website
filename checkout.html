<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }

    .summary {
      margin-top: 30px;
      font-size: 20px;
      text-align: right;
    }

    form {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
    }

    input, textarea {
      padding: 12px;
      background: transparent;
      border: 1px solid white;
      color: white;
    }

    button {
      padding: 12px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Checkout</h1>

  <h2>Order Summary</h2>
<div id="cartContainer"></div>
<div style="margin-top:20px; font-size:18px; max-width:400px; margin-left:auto;">

  <div style="display:flex; justify-content:space-between;">
    <span id="subtotal"></span>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <span id="shipping">Shipping: €0</span>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <span id="vat">VAT: €0</span>
  </div>

  <hr>

  <!-- TOTAL BELOW VAT (STRICT ORDER) -->
  <div style="display:flex; justify-content:space-between; font-weight:bold;">
    <span>Total</span>
    <span id="total"></span>
  </div>

</div>
  
<h2>Shipping Details</h2>

<form>
  <input type="text" placeholder="Full Name" required>
  <input type="email" placeholder="Email" required>
  <input type="text" placeholder="Address" required>
  <input type="text" placeholder="City" required>
  <input type="text" placeholder="Postal Code" required>
  <input type="text" placeholder="Country" required>

  <div style="display:flex; gap:10px; margin-top:20px;">
  
  <button id="calcShippingBtn" type="button" onclick="calculateShipping()">
    Calculate Shipping Costs
  </button>

  <button id="paymentBtn" type="button" style="display:none; background:#4CAF50; color:white;" onclick="proceedToPayment()">
    Proceed to Payment
  </button>

</div>
</form>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");

  let subtotal = 0;

cart.forEach(item => {
  subtotal += item.price;
});
  
container.innerHTML = "";

// Render cart
cart.forEach(item => {
  subtotal += item.price;

  container.innerHTML += `
    <div class="cart-item">
      <img src="${item.img}">
      <div>
        <p>${item.name}</p>
        <p>€${item.price}</p>
      </div>
    </div>
  `;
});

// VAT logic
  let vat = 0;

cart.forEach(item => {
  let rate = 0.19;

  if (item.type === "original") {
    rate = 0.07;
  }

  vat += item.price * rate;
});

let vat = subtotal * vatRate;
let shipping = 0;
let total = subtotal + vat + shipping;

// initial render
updateUI();

let shippingCalculated = false;

function updateUI() {
  document.getElementById("subtotal").innerText = "Subtotal: €" + subtotal.toFixed(2);
  document.getElementById("vat").innerText = "VAT: €" + vat.toFixed(2);
  document.getElementById("total").innerText = "€" + total.toFixed(2);
  document.getElementById("shipping").innerText = "Shipping: €" + shipping.toFixed(2);
}

// SHIPPING
function calculateShipping() {
  shipping = 15;

  vat = subtotal * vatRate;
  total = subtotal + vat + shipping;

  updateUI();

  shippingCalculated = true;

  document.getElementById("paymentBtn").style.display = "block";
}

// PAYMENT
function proceedToPayment() {
  if (!shippingCalculated) {
    alert("Please calculate shipping first.");
    return;
  }

  alert("Proceeding to Stripe integration...");
}
</script>

</body>
</html>
