<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      margin: 0;
    }

    h1, h2 {
      text-align: center;
      letter-spacing: 3px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
    }

    .summary-box {
      max-width: 500px;
      margin: 40px auto;
      border: 1px solid #333;
      padding: 25px;
      border-radius: 10px;
      background: #111;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .total-row {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }

    .checkout-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }

    form {
      width: 100%;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input,
    textarea {
      padding: 14px;
      background: transparent;
      border: 1px solid white;
      color: white;
      font-size: 15px;
      outline: none;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      padding: 14px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      border-radius: 5px;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
    }

    .vat-breakdown {
      margin-top: 25px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media(max-width: 700px) {
      body {
        padding: 20px;
      }

      .summary-box {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<h1>CHECKOUT</h1>

<!-- ORDER SUMMARY -->
<div class="summary-box">

  <h2>Order Summary</h2>

  <div id="cartContainer"></div>

  <div class="summary-row">
    <span>Subtotal</span>
    <span id="subtotal">€0</span>
  </div>

  <div class="summary-row">
    <span>Shipping</span>
    <span>FREE</span>
  </div>

  <div class="summary-row">
    <span>VAT</span>
    <span id="vat">€0</span>
  </div>

  <hr>

  <div class="summary-row total-row">
    <span>Total</span>
    <span id="total">€0</span>
  </div>

  <div class="vat-breakdown">
    <p id="vat19">19% VAT: €0</p>
    <p id="vat7">7% VAT: €0</p>
  </div>

</div>

<!-- SHIPPING FORM -->
<div class="checkout-wrapper">

  <h2>Shipping Information</h2>

  <form id="checkoutForm">

    <input type="text" id="fullName" placeholder="Full Name" required>

    <input type="email" id="email" placeholder="Email Address" required>

    <input type="text" id="address1" placeholder="Street Address / House Number" required>

    <input type="text" id="address2" placeholder="Apartment, Suite, Unit (Optional)">

    <input type="text" id="city" placeholder="City / Town" required>

    <input type="text" id="state" placeholder="State / Province / Region" required>

    <input type="text" id="postal" placeholder="Postal / ZIP Code" required>

    <input type="text" id="country" placeholder="Country" required>

   <label for="collectorName" style="
  color: #ccc;
  margin-top: 10px;
  font-size: 14px;
  letter-spacing: 1px;
">
  Collector Name (for Certificate of Authenticity & Authorship)
</label>

<textarea
  id="collectorName"
  placeholder="Enter full collector name"
  rows="3"
  required
></textarea>

    <textarea id="notes" placeholder="Delivery Notes (Optional)"></textarea>

    <button id="paymentBtn" type="button" disabled onclick="proceedToPayment()">
      Proceed to Payment
    </button>

  </form>

</div>
<script>

let cart = [];

function loadCart() {
  try {
    const stored = localStorage.getItem("cart");
    console.log("RAW CART:", stored);

    cart = stored ? JSON.parse(stored) : [];
  } catch (e) {
    console.error("Cart parse error:", e);
    cart = [];
  }

  console.log("PARSED CART:", cart);
}

loadCart();

const container = document.getElementById("cartContainer");

let subtotal = 0;
let vat = 0;
let vat19 = 0;
let vat7 = 0;

/* ===== RENDER ===== */
function renderCart() {

  container.innerHTML = "";

  subtotal = 0;
  vat = 0;
  vat19 = 0;
  vat7 = 0;

  cart.forEach(item => {

    const price = Number(item.price || 0);
    const img = item.img || "";
    const name = item.name || "Artwork";

    subtotal += price;

    const vatRate = item.type === "original" ? 0.07 : 0.19;
    const itemVat = price * vatRate;

    vat += itemVat;

    if (vatRate === 0.19) vat19 += itemVat;
    else vat7 += itemVat;

    container.innerHTML += `
      <div class="cart-item">
        <img src="${img}">
        <div>
          <p>${name}</p>
          <p>€${price.toFixed(2)}</p>
        </div>
      </div>
    `;
  });

  updateUI();
}

/* ===== UI UPDATE ===== */
function updateUI() {

  const total = subtotal + vat;

  document.getElementById("subtotal").innerText = "€" + subtotal.toFixed(2);
  document.getElementById("vat").innerText = "€" + vat.toFixed(2);
  document.getElementById("total").innerText = "€" + total.toFixed(2);

  document.getElementById("vat19").innerText = "19% VAT: €" + vat19.toFixed(2);
  document.getElementById("vat7").innerText = "7% VAT: €" + vat7.toFixed(2);
}

renderCart();

/* ===== VALIDATION ===== */

const requiredFields = [
  "fullName",
  "email",
  "address1",
  "city",
  "state",
  "postal",
  "country",
  "collectorName"
];

requiredFields.forEach(id => {
  document.getElementById(id).addEventListener("input", validateForm);
});

function validateForm() {
  let valid = requiredFields.every(id =>
    document.getElementById(id).value.trim()
  );

  document.getElementById("paymentBtn").disabled = !valid;
}

/* ===== PAYMENT ===== */

function proceedToPayment() {

  const shippingInfo = {
    fullName: document.getElementById("fullName").value,
    email: document.getElementById("email").value,
    address1: document.getElementById("address1").value,
    address2: document.getElementById("address2").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    postal: document.getElementById("postal").value,
    country: document.getElementById("country").value,
    collectorName: document.getElementById("collectorName").value,
    notes: document.getElementById("notes").value
  };

  localStorage.setItem("shippingInfo", JSON.stringify(shippingInfo));

  fetch("/api/create-checkout-session", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
    cart: cart,
    shipping: shippingInfo
    })
  })
  .then(async (res) => {
    const data = await res.json();
    console.log("RESPONSE:", data);

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Error: " + (data.error || "Unknown error"));
    }
  })
  .catch(err => {
    console.error("FETCH FAILED:", err);
    alert("Server error");
  });
}

</script>

</body>
</html>
