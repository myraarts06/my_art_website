<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }

    .summary {
      margin-top: 30px;
      font-size: 20px;
      text-align: right;
    }

    form {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
    }

    input, textarea {
      padding: 12px;
      background: transparent;
      border: 1px solid white;
      color: white;
    }

    button {
      padding: 12px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Checkout</h1>

<div id="cartContainer"></div>

<div class="summary" id="total"></div>

  <h2>Order Summary</h2>
<div id="cartContainer"></div>

<div style="margin-top:20px; font-size:18px;">
  <p id="subtotal"></p>
  <p id="shipping">Shipping: €0</p>
  <p id="vat">VAT: €0</p>
  <hr>
  <h3 id="total"></h3>
</div>
  
<h2>Shipping Details</h2>

<form>
  <input type="text" placeholder="Full Name" required>
  <input type="email" placeholder="Email" required>
  <input type="text" placeholder="Address" required>
  <input type="text" placeholder="City" required>
  <input type="text" placeholder="Postal Code" required>
  <input type="text" placeholder="Country" required>

  <button type="submit">Proceed to Payment</button>
</form>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");

let subtotal = 0;

cart.forEach(item => {
  subtotal += item.price;

  container.innerHTML += `
    <div style="display:flex; gap:15px; margin-bottom:15px;">
      <img src="${item.img}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
      <div>
        <p>${item.name}</p>
        <p>€${item.price}</p>
      </div>
    </div>
  `;
});

let shipping = 0; // future Shippo
let vat = subtotal * 0.19; // Germany default VAT (temporary)

let total = subtotal + shipping + vat;

document.getElementById("subtotal").innerText = "Subtotal: €" + subtotal.toFixed(2);
document.getElementById("vat").innerText = "VAT: €" + vat.toFixed(2);
document.getElementById("total").innerText = "Total: €" + total.toFixed(2);
</script>

</body>
</html>
