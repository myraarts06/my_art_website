<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }

    .summary {
      margin-top: 30px;
      font-size: 20px;
      text-align: right;
    }

    form {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
    }

    input, textarea {
      padding: 12px;
      background: transparent;
      border: 1px solid white;
      color: white;
    }

    button {
      padding: 12px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

     .checkout-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.checkout-wrapper form {
  width: 100%;
  max-width: 500px;
}
  </style>
</head>

<body>

<h1>CHECKOUT</h1>

  <h2>Order Summary</h2>
<div id="cartContainer"></div>
<div style="margin-top:20px; font-size:18px; max-width:400px; margin-left:auto;">

  <div style="display:flex; justify-content:space-between;">
    <span id="subtotal"></span>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <span id="shipping">Shipping: €0</span>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <span id="vat">VAT: €0</span>
  </div>

  <hr>

  <!-- TOTAL BELOW VAT (STRICT ORDER) -->
  <div style="display:flex; justify-content:space-between; font-weight:bold;">
    <span>Total</span>
    <span id="total"></span>
  </div>
  <div style="margin-top:20px; font-size:14px; opacity:0.8; text-align:right;">
  <h4>VAT Breakdown</h4>
  <p id="vat19">19% VAT: €0</p>
  <p id="vat7">7% VAT: €0</p>
</div>

</div>
  <div class="checkout-wrapper">

  <h2>Shipping Details</h2>

  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Address" required>
    <input type="text" placeholder="City" required>
    <input type="text" placeholder="Postal Code" required>
    <input type="text" placeholder="Country" required>

    <div style="display:flex; gap:10px; margin-top:20px; justify-content:center;">
      
      <button id="calcShippingBtn" type="button" onclick="calculateShipping()">
        Calculate Shipping Costs
      </button>

      <button id="paymentBtn" type="button"
        style="display:none; background:#4CAF50; color:white;"
        onclick="proceedToPayment()">
        Proceed to Payment
      </button>

    </div>
  </form>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");

container.innerHTML = "";

// ===== SAFE INIT =====
let subtotal = 0;
let vat = 0;
let vat19 = 0;
let vat7 = 0;
let shipping = 0;
let total = 0;

// 1. Render cart + calculate values correctly
cart.forEach(item => {
  const price = Number(item.price);
  const rate = item.type === "original" ? 0.07 : 0.19;

  subtotal += price;

  const itemVat = price * rate;
  vat += itemVat;

  if (rate === 0.19) vat19 += itemVat;
  else vat7 += itemVat;

  container.innerHTML += `
    <div class="cart-item">
      <img src="${item.img}">
      <div>
        <p>${item.name}</p>
        <p>€${price.toFixed(2)}</p>
      </div>
    </div>
  `;
});

  
// 2. Initial total
  function recalcTotal() {
  total = subtotal + vat + shipping;
}

// 3. UI update function
function updateUI() {
  recalcTotal();

  document.getElementById("subtotal").innerText = "Subtotal: €" + subtotal.toFixed(2);
  document.getElementById("vat").innerText = "VAT: €" + vat.toFixed(2);
  document.getElementById("shipping").innerText = "Shipping: €" + shipping.toFixed(2);
  document.getElementById("total").innerText = "€" + total.toFixed(2);

  document.getElementById("vat19").innerText = "19% VAT: €" + vat19.toFixed(2);
  document.getElementById("vat7").innerText = "7% VAT: €" + vat7.toFixed(2);
}

  
// initial render
updateUI();

let shippingCalculated = false;

// 4. Shipping
async function calculateShipping() {
  try {
    const country = document.querySelector('input[placeholder="Country"]').value;

    const res = await fetch("/api/shippo-rate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ country })
    });

    const data = await res.json();

    shipping = Number(data.shippingCost || 0);

    total = subtotal + vat + shipping;

    updateUI();

    shippingCalculated = true;

    document.getElementById("paymentBtn").style.display = "block";

  } catch (err) {
    console.error("Shipping error:", err);
    alert("Shipping calculation failed. Check console.");
  }
}
  
// 5. Payment
function proceedToPayment() {
  if (!shippingCalculated) {
    alert("Please calculate shipping first.");
    return;
  }

  alert("Proceeding to Stripe integration...");
}
 
</script>

</body>
</html>
