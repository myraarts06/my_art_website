<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .page {
      display: none;
      padding: 40px;
      text-align: center;
      min-height: 100vh;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
      flex-wrap: wrap;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    /* animation */
    .animate .letter {
      animation: drop 1s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* delays */
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* light sweep */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* MENU */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
    }

    .bar {
      width: 30px;
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      right: -250px;
      top: 0;
      width: 250px;
      height: 100vh;
      background: #111;
      transition: 0.5s;
      padding-top: 80px;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      display: block;
      width: 100%;
      padding: 15px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* PORTFOLIO */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-content {
      display: none;
      margin-top: 30px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
    }

    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

  </style>
</head>

<body>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active animate">
  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="social">
    <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">
    <span class="letter l1">P</span>
    <span class="letter l2">O</span>
    <span class="letter l3">R</span>
    <span class="letter l4">T</span>
    <span class="letter l5">F</span>
    <span class="letter l6">O</span>
    <span class="letter l7">L</span>
    <span class="letter l8">I</span>
    <span class="letter l1">O</span>
  </div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="paint" class="portfolio-content">
    <div class="product-grid">
      <img src="images/art1.jpg">
      <img src="images/art2.jpg">
    </div>
  </div>
</div>

<!-- OTHER PAGES -->
<div id="about" class="page"><div class="title"><span class="letter l1">A</span><span class="letter l2">B</span><span class="letter l3">O</span><span class="letter l4">U</span><span class="letter l5">T</span></div></div>
<div id="contact" class="page"><div class="title"><span class="letter l1">C</span><span class="letter l2">O</span><span class="letter l3">N</span><span class="letter l4">T</span><span class="letter l5">A</span><span class="letter l6">C</span><span class="letter l7">T</span></div></div>
<div id="payment" class="page"><div class="title"><span class="letter l1">P</span><span class="letter l2">A</span><span class="letter l3">Y</span><span class="letter l4">M</span><span class="letter l5">E</span><span class="letter l6">N</span><span class="letter l7">T</span></div></div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

function openPage(id) {
  document.querySelectorAll(".page").forEach(p => {
    p.classList.remove("active");
    p.classList.remove("animate");
  });

  const page = document.getElementById(id);
  page.classList.add("active");

  // FORCE animation restart
  setTimeout(() => {
    page.classList.add("animate");
  }, 10);

  document.getElementById("menu").classList.remove("open");
}

function showPortfolio(id) {
  document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
