<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      text-align: center;
    }
    header {
      padding: 30px;
      background: white;
    }
    h1 {
      margin: 0;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    .button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Myra Arts 🎨</h1>
  <p>Original artworks & commissions</p>
</header>

<section class="gallery">

  <div class="card">
    <img src="art1.jpg" alt="Artwork">
    <p>Artwork Title – €100</p>
    <a class="button" href="#">Buy Now</a>
  </div>

  <div class="card">
    <img src="art2.jpg" alt="Artwork">
    <p>Artwork Title – €150</p>
    <a class="button" href="#">Buy Now</a>
  </div>

</section>

</body>
</html>
