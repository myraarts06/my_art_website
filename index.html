<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    #entryScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: pointer;
      text-align: center;
    }

    #entryScreen h1 {
      font-size: 26px;
      color: silver;
      letter-spacing: 3px;
    }

    #entryScreen p {
      opacity: 0.6;
    }

    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    #home .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    #home .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #home .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    /* ===== CONTACT FORM ===== */
    .contact-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .contact-form {
      width: 90%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border: 1px solid white;
      background: transparent;
      color: white;
      outline: none;
    }

    .contact-form button {
      padding: 12px;
      border: 1px solid white;
      background: white;
      color: black;
      cursor: pointer;
    }

    /* ===== MODAL ===== */
    #paintingModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100000;
    }

    .modal-content {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      text-align: center;
    }

    .modal-content img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }
  </style>
</head>

<body>

<div id="entryScreen">
  <h1>MYRA ARTS</h1>
  <p>Click to enter ✨</p>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">Music ON</button>

<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>
</div>

<div id="portfolio" class="page">
  <div class="title">PORTFOLIO</div>

  <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>

  <div id="paint" class="portfolio-content active">
    <div class="product-grid">
      <div class="product">
        <img src="images/art1.jpg"
        onclick="openPainting('Sunset Dream','A calm emotional sunset piece.','24x36 inches','€250','images/art1.jpg')">
      </div>

      <div class="product">
        <img src="images/art2.jpg"
        onclick="openPainting('Inner Thoughts','Abstract expression of emotions.','18x24 inches','€180','images/art2.jpg')">
      </div>
    </div>
  </div>
</div>

<div id="contact" class="page">
  <div class="title">CONTACT</div>

  <div class="contact-container">
    <form class="contact-form" action="https://formspree.io/f/xqewvnrq" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<!-- MODAL -->
<div id="paintingModal">
  <div class="close-btn" onclick="closePainting()">×</div>
  <div class="modal-content">
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <p id="modalSize"></p>
    <h3 id="modalPrice"></h3>
  </div>
</div>

<script>
function openPainting(title, desc, size, price, img){
  modalTitle.innerText = title;
  modalDesc.innerText = desc;
  modalSize.innerText = size;
  modalPrice.innerText = price;
  modalImg.src = img;
  paintingModal.style.display = "flex";
}

function closePainting(){
  paintingModal.style.display = "none";
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
