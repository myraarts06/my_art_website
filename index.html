<!DOCTYPE html> <html> <head> <title>Myra Arts</title> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <style> body { margin: 0; background: black; color: white; font-family: Arial, sans-serif; overflow-x: hidden; } /* ===== ENTRY SCREEN ===== */ #entryScreen { position: fixed; inset: 0; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; cursor: pointer; text-align: center; } #entryScreen h1 { font-size: 26px; color: silver; letter-spacing: 3px; } #entryScreen p { opacity: 0.6; } /* ===== PAGE SYSTEM ===== */ .page { display: none; padding: 40px; min-height: 100vh; text-align: center; } .page.active { display: block; } /* ===== TITLE ===== */ .title { font-size: 60px; letter-spacing: 8px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; color: silver; margin-top: 80px; position: relative; } /* ===== ONLY HOME ANIMATION ===== */ #home .letter { opacity: 0; transform: translateY(-200px); } #home .drop { animation: drop 0.8s forwards; } @keyframes drop { 0% { opacity: 0; transform: translateY(-200px); } 70% { transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } } #home .title::after { content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent); transform: skewX(-25deg); animation: lightSweep 2s ease forwards; animation-delay: 1.5s; } @keyframes lightSweep { 0% { left: -100%; } 100% { left: 150%; } } /* ===== SOCIAL ===== */ .social { margin-top: 100px; display: flex; justify-content: center; } .social a:hover { transform: scale(1.2); } /* ===== MENU ===== */ .hamburger { position: fixed; top: 20px; right: 20px; width: 35px; cursor: pointer; z-index: 10000; } .bar { height: 4px; background: white; margin: 6px 0; } .sidepanel { position: fixed; top: 0; right: -300px; width: 250px; height: 100vh; background: #111; padding-top: 80px; transition: 0.4s; z-index: 9999; } .sidepanel.open { right: 0; } .sidepanel button { width: 100%; padding: 20px; background: none; border: none; color: white; text-align: left; cursor: pointer; } .sidepanel button:hover { background: #222; } /* ===== PORTFOLIO ===== */ .portfolio-options { margin-top: 40px; } .portfolio-btn { padding: 10px 20px; border: 1px solid white; background: none; color: white; margin: 10px; cursor: pointer; } .portfolio-content { display: none; margin-top: 40px; } .portfolio-content.active { display: block; } .product-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 20px; } .product img { width: 250px; border-radius: 10px; cursor: pointer; transition: 0.3s; } .product img:hover { transform: scale(1.05); } /* ===== MODAL (NEW SPA VIEW) ===== */ #paintingModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 999999999; pointer-events: auto; } .page { position: relative; z-index: 1; } .modal-content { background: #111; padding: 30px; border-radius: 12px; max-width: 500px; text-align: center; } .modal-content img { width: 100%; border-radius: 10px; margin-bottom: 15px; } .close-btn { position: absolute; top: 20px; right: 30px; font-size: 30px; cursor: pointer; color: white; } /* ===== MUSIC BUTTON ===== */ .music-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 14px; border: 1px solid white; background: black; color: white; cursor: pointer; z-index: 10000; } /* ===== CONTACT FORM ===== */ .contact-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; } .contact-form { width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; } .contact-form input, .contact-form textarea { padding: 12px; border: 1px solid white; background: transparent; color: white; outline: none; } .contact-form button { padding: 12px; border: 1px solid white; background: white; color: black; cursor: pointer; } .shop-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 40px; margin-top: 40px; justify-items: center; } .shop-item { width: 220px; text-align: center; } .shop-item img { width: 100%; border-radius: 10px; transition: 0.3s; } .shop-item img:hover { transform: scale(1.05); } .shop-item .desc { font-weight: bold; letter-spacing: 2px; color: #ccc; } .shop-item p:last-of-type { font-weight: bold; letter-spacing: 1px; } #cartIcon { position: fixed; bottom: 20px; left: 20px; background: black; border: 1px solid white; padding: 14px 18px; border-radius: 50px; cursor: pointer; z-index: 10000; display: none; /* IMPORTANT */ align-items: center; gap: 10px; font-size: 20px; } #cartIcon span { font-weight: bold; font-size: 16px; } </style> </head> <div id="cartPanel" style=" position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: #111; color: white; padding: 20px; transition: 0.3s; z-index: 99999; overflow-y: auto; "> <h2>Cart</h2> <div id="cartItems"></div> <hr style="margin:15px 0;"> <p id="cartTotal">Total: €0</p> <button onclick="closeCart()" style="margin-bottom:10px;"> Close </button> </div> <body> <!-- ENTRY SCREEN --> <div id="entryScreen"> <h1>MYRA ARTS</h1> <p>Click to enter ✨</p> </div> <!-- AUDIO --> <audio id="bgMusic" loop> <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"> </audio> <button class="music-btn" onclick="toggleMusic()" id="musicBtn">Music ON</button> <!-- MENU --> <div class="hamburger" onclick="toggleMenu()"> <div class="bar"></div><div class="bar"></div><div class="bar"></div> </div> <div id="menu" class="sidepanel"> <button onclick="openPage('home')">Home</button> <button onclick="openPage('portfolio')">Portfolio</button> <button onclick="openPage('about')">About Me</button> <button onclick="openPage('contact')">Contact</button> <button onclick="openPage('payment')">Shop</button> </div> <!-- HOME --> <div id="home" class="page active"> <div class="title" data-text="MYRA ARTS"></div> <div class="social"> <a href="https://www.instagram.com/myraarts06/" target="_blank"> <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i> </a> </div> </div> <!-- PORTFOLIO --> <div id="portfolio" class="page"> <div class="title">PORTFOLIO</div> <div class="portfolio-options"> <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button> <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button> </div> <div id="photo" class="portfolio-content"> <p>Photography coming soon...</p> </div> <div id="paint" class="portfolio-content"> <div class="product-grid"> <div class="product"> <img src="images/art1.jpg" onclick="openPainting('Sunset Dream', 'images/art1.jpg')"> </div> <div class="product"> <img src="images/art2.jpg" onclick="openPainting('Inner Thoughts', 'images/art2.jpg')"> </div> </div> </div> </div> <!-- ABOUT --> <div id="about" class="page"> <div class="title">ABOUT ME</div> </div> <!-- CONTACT --> <div id="contact" class="page"> <div class="title">CONTACT</div> <div class="contact-container"> <form class="contact-form" action="https://formspree.io/f/xqewvnrq" method="POST"> <input type="text" name="name" placeholder="Your Name" required> <input type="email" name="email" placeholder="Your Email" required> <textarea name="message" placeholder="Your Message" rows="6" required></textarea> <button type="submit">Send</button> </form> </div> </div> <!-- PAYMENT --> <div id="payment" class="page"> <div class="title">SHOP</div> <!-- CART ICON (ONLY SHOP PAGE) --> <div id="cartIcon" onclick="openCart()"> 🛒 <span id="cartCount">0</span> </div> <div class="shop-list"> <!-- PRODUCT 1 --> <div class="shop-item"> <img src="images/art1.jpg"> <h2>Sunset Dream</h2> <p class="desc">PRINT ONLY</p> <p>24x36 inches</p> <p>€250 + SHIPPING + VAT</p> <button onclick="addToCart('Sunset Dream', 250, 'images/art1.jpg', event)"> Buy Now </button> </div> <!-- PRODUCT 2 --> <div class="shop-item"> <img src="images/art2.jpg"> <h2>Inner Thoughts</h2> <p class="desc">PRINT ONLY</p> <p>18x24 inches</p> <p>€180 + SHIPPING + VAT</p> <button onclick="addToCart('Inner Thoughts', 180, 'images/art2.jpg', event)"> Buy Now </button> </div> <!-- ===== MODAL (NEW SPA) ===== --> <div id="paintingModal"> <div class="close-btn" onclick="closePainting()">×</div> <div class="modal-content"> <img id="modalImg"> <h2 id="modalTitle"></h2> </div> </div> <script> const music = document.getElementById("bgMusic"); const musicBtn = document.getElementById("musicBtn"); let musicOn = true; document.getElementById("entryScreen").addEventListener("click", async () => { document.getElementById("entryScreen").style.display = "none"; music.volume = 0; music.play(); let v = 0; const fade = setInterval(() => { if (v < 0.4) { v += 0.05; music.volume = v; } else clearInterval(fade); }, 150); startHomeAnimation(); }); function startHomeAnimation() { const title = document.querySelector("#home .title"); const text = title.getAttribute("data-text"); title.innerHTML = ""; text.split("").forEach((char, i) => { const span = document.createElement("span"); span.classList.add("letter"); span.innerHTML = char === " " ? "&nbsp;" : char; setTimeout(() => span.classList.add("drop"), i * 120); title.appendChild(span); }); } function toggleMusic() { if (musicOn) { music.pause(); musicBtn.innerText = "Music OFF"; } else { music.play(); musicBtn.innerText = "Music ON"; } musicOn = !musicOn; } function toggleMenu() { document.getElementById("menu").classList.toggle("open"); } function openPage(id) { document.querySelectorAll(".page").forEach(p => p.classList.remove("active")); document.getElementById(id).classList.add("active"); updateCartVisibility(id); } function showPortfolio(id) { document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active")); document.getElementById(id).classList.add("active"); } // ===== NEW SPA PAINTING VIEW ===== function openPainting(title, img) { event?.stopPropagation(); // prevents weird bubbling issues document.getElementById("modalTitle").innerText = title; document.getElementById("modalImg").src = img; document.getElementById("paintingModal").style.display = "flex"; } function closePainting() { document.getElementById("paintingModal").style.display = "none"; } let cart = []; function addToCart(name, price, img, event) { cart.push({ name, price, img }); document.getElementById("cartCount").innerText = cart.length; renderCart(); flyToCart(img, event); } function openCart() { document.getElementById("cartPanel").style.right = "0"; renderCart(); } function renderCart() { const container = document.getElementById("cartItems"); container.innerHTML = ""; let total = 0; cart.forEach((item, index) => { total += item.price; container.innerHTML += <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;"> <img src="${item.img}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;"> <div style="flex:1"> <p style="margin:0;font-size:14px;">${item.name}</p> <p style="margin:0;font-size:12px;color:gray;">€${item.price}</p> </div> <button onclick="removeFromCart(${index})" style=" background:red; color:white; border:none; cursor:pointer; padding:4px 8px; ">X</button> </div> ; }); document.getElementById("cartTotal").innerText = "Total: €" + total; } function removeFromCart(index) { cart.splice(index, 1); document.getElementById("cartCount").innerText = cart.length; renderCart(); } function flyToCart(imgSrc, event) { const img = document.createElement("img"); img.src = imgSrc; const rect = event.target.getBoundingClientRect(); img.style.position = "fixed"; img.style.left = rect.left + "px"; img.style.top = rect.top + "px"; img.style.width = "80px"; img.style.height = "80px"; img.style.objectFit = "cover"; img.style.zIndex = 99999; img.style.transition = "0.8s ease"; document.body.appendChild(img); const cartRect = document.getElementById("cartIcon").getBoundingClientRect(); setTimeout(() => { img.style.left = cartRect.left + "px"; img.style.top = cartRect.top + "px"; img.style.width = "20px"; img.style.height = "20px"; img.style.opacity = "0"; }, 10); setTimeout(() => img.remove(), 900); } function updateCartVisibility(pageId) { const cartIcon = document.getElementById("cartIcon"); if (pageId === "payment") { cartIcon.style.display = "flex"; } else { cartIcon.style.display = "none"; } } function closeCart() { document.getElementById("cartPanel").style.right = "-320px"; } </script> </body> </html>
