<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== ENTRY SCREEN ===== */
    #entryScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: pointer;
      text-align: center;
    }

    #entryScreen h1 {
      font-size: 26px;
      color: silver;
      letter-spacing: 3px;
    }

    #entryScreen p {
      opacity: 0.6;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* ===== SOCIAL ===== */
    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ===== MENU ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    /* ===== ART DETAIL PAGE ===== */
    .art-detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 80px;
      gap: 20px;
    }

    .art-detail img {
      width: 320px;
      border-radius: 12px;
    }

    .art-info {
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }

    .price {
      margin-top: 10px;
      font-size: 20px;
      color: #ffd700;
    }

  </style>
</head>

<body>

<!-- ENTRY SCREEN -->
<div id="entryScreen">
  <h1>MYRA ARTS</h1>
  <p>Click to enter ✨</p>
</div>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title" data-text="PORTFOLIO"></div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="paint" class="portfolio-content active">
    <div class="product-grid">

      <div class="product">
        <img src="images/art1.jpg">
      </div>

      <!-- CLICKABLE ART 2 -->
      <div class="product">
        <img src="images/art2.jpg" onclick="openArt()">
      </div>

    </div>
  </div>
</div>

<!-- ART DETAIL PAGE -->
<div id="artPage" class="page">
  <div class="title" data-text="ARTWORK"></div>

  <div class="art-detail">
    <img src="images/art2.jpg">

    <div class="art-info">
      <h2>Artwork Title: Buddha Painting</h2>

      <p>
        Description: Handmade acrylic painting on canvas.  
        Size: 24 x 36 inches.  
        Style: Contemporary spiritual art.
      </p>

      <div class="price">Price: 1200 Euros</div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <div class="title" data-text="ABOUT ME"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <div class="title" data-text="CONTACT"></div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <div class="title" data-text="PAYMENT"></div>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
    animateTitle(document.getElementById(id));
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function openArt() {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("artPage").classList.add("active");
    animateTitle(document.getElementById("artPage"));
  }

  function animateTitle(page) {
    const title = page.querySelector(".title");
    if (!title) return;

    const text = title.getAttribute("data-text");
    if (!text) return;

    title.innerHTML = "";

    text.split("").forEach((char, i) => {
      const span = document.createElement("span");
      span.classList.add("letter");
      span.innerHTML = char === " " ? "&nbsp;" : char;

      setTimeout(() => span.classList.add("drop"), i * 120);

      title.appendChild(span);
    });
  }

  document.getElementById("entryScreen").addEventListener("click", () => {
    document.getElementById("entryScreen").style.display = "none";
    animateTitle(document.querySelector(".page.active"));
  });
</script>

</body>
</html>
