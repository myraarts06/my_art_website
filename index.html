<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 200vh; /* makes homepage scrollable */
      position: relative;
      padding-top: 120px;
      text-align: center;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 70px;
      letter-spacing: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      color: silver;
      position: relative;
      perspective: 800px;
      text-shadow:
        -3px 0px 10px rgba(255,255,255,0.2),
        8px 0px 15px rgba(0,0,0,0.8);
    }

    /* falling letters */
    .letter {
      opacity: 0;
      transform: translateY(-250px) rotateX(90deg);
      animation: fall 1.2s forwards;
    }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translateY(-250px) rotateX(90deg);
      }
      70% {
        transform: translateY(20px) rotateX(0deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* delay per letter */
    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.3s; }
    .l3 { animation-delay: 0.5s; }
    .l4 { animation-delay: 0.7s; }
    .l5 { animation-delay: 0.9s; }
    .l6 { animation-delay: 1.1s; }
    .l7 { animation-delay: 1.3s; }
    .l8 { animation-delay: 1.5s; }

    /* ===== LIGHT SHADOW EFFECT (RIGHT SIDE LIGHT) ===== */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      right: -100px;
      width: 200px;
      height: 100%;
      background: linear-gradient(to left,
        rgba(255,255,255,0.25),
        transparent);
      filter: blur(8px);
      animation: lightSweep 3s ease-in-out forwards;
    }

    @keyframes lightSweep {
      0% { opacity: 0; transform: translateX(100px); }
      50% { opacity: 1; }
      100% { opacity: 0.3; transform: translateX(-50px); }
    }

    /* ================= SOCIAL LINKS ================= */

    .social {
      margin-top: 400px;
      padding-bottom: 100px;
    }

    .social a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.7;
    }

    .social a:hover {
      opacity: 1;
    }

    /* ================= HAMBURGER MENU ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
      transition: 0.3s;
    }

    /* ================= SIDE PANEL ================= */

    .menu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      padding-top: 100px;
      transition: 0.5s;
      z-index: 999;
    }

    .menu.active {
      right: 0;
    }

    .menu button {
      background: none;
      border: none;
      color: white;
      padding: 20px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
    }

    .menu button:hover {
      background: #222;
    }

    /* ================= PAGES ================= */

    .page {
      display: none;
      padding: 60px;
      background: #0d0d0d;
      min-height: 100vh;
    }

    .page.active {
      display: block;
    }

    h2 {
      color: silver;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    .btn {
      padding: 10px 15px;
      background: silver;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div class="menu" id="menu">
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div class="home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:30px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <!-- scroll content placeholder -->
  <div style="height:300px;"></div>

  <!-- SOCIAL LINKS -->
  <div class="social">
    <a href="https://instagram.com/YOUR_USERNAME" target="_blank">Instagram</a>
    <a href="https://linkedin.com/in/YOUR_PROFILE" target="_blank">LinkedIn</a>
  </div>

</div>

<!-- PAGES -->
<div id="portfolio" class="page">
  <h2>Portfolio</h2>
  <div class="grid">
    <div class="card"><img src="art1.jpg"></div>
    <div class="card"><img src="art2.jpg"></div>
  </div>
</div>

<div id="about" class="page">
  <h2>About Me</h2>
  <p>Myra Arts - visual storytelling through art.</p>
</div>

<div id="contact" class="page">
  <h2>Contact</h2>
  <form action="https://formspree.io/f/YOUR_ID" method="POST">
    <input type="text" name="name" placeholder="Name">
    <input type="email" name="email" placeholder="Email">
    <textarea name="message" placeholder="Message"></textarea>
    <button class="btn" type="submit">Send</button>
  </form>
</div>

<div id="payment" class="page">
  <h2>Payment</h2>
  <button class="btn">Pay / Commission</button>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
  }

  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    toggleMenu();
  }
</script>

</body>
</html>
