<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Organic calligraphy font -->
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* ================= LIVING TITLE ================= */

    .title {
      font-size: 80px;
      letter-spacing: 6px;
      display: flex;
      gap: 15px;
      position: relative;
      margin-top: 100px;

      font-family: 'Parisienne', cursive;
      color: #d8d8d8;

      text-shadow:
        0 0 8px rgba(255,255,255,0.15),
        0 0 25px rgba(255,255,255,0.05);

      animation: breathe 6s ease-in-out infinite;
      animation-delay: 3s;
    }

    /* 🌿 breathing life effect */
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* ================= FALLING LETTERS ================= */

    .letter {
      opacity: 0;
      transform: translateY(-220px) rotate(-10deg);
      animation: drop 1.2s forwards;
      position: relative;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-220px) rotate(-10deg); }
      70% { transform: translateY(15px) rotate(3deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* ================= CINEMATIC LIGHT SWEEP ================= */

    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      transform: skewX(-25deg);
      animation: lightSweep 2.5s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lightSweep {
      0% { left: -120%; }
      100% { left: 150%; }
    }

    /* ================= FLOATING BOTANICAL PARTICLES ================= */

    .leaf {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(144, 238, 144, 0.5);
      border-radius: 50%;
      filter: blur(1px);
      animation: floatLeaf 8s infinite ease-in-out;
    }

    @keyframes floatLeaf {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      30%  { opacity: 0.7; }
      100% { transform: translateY(-160px) translateX(50px); opacity: 0; }
    }

    /* ================= HOME CONTENT ================= */

    .content {
      margin-top: 200px;
      width: 80%;
      max-width: 900px;
      text-align: center;
      opacity: 0.7;
    }

    /* ================= SOCIAL LINKS ================= */

    .social {
      margin-top: 150px;
      text-align: center;
    }

    .social a {
      text-decoration: none;
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
      transition: 0.3s;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      display: block;
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ================= PAGES ================= */

    .page {
      display: none;
      padding: 40px;
    }

    .page.active {
      display: block;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div class="home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>

    <!-- botanical floating particles -->
    <div class="leaf" style="left:10%; top:60px; animation-delay:0s;"></div>
    <div class="leaf" style="left:30%; top:80px; animation-delay:1s;"></div>
    <div class="leaf" style="left:60%; top:70px; animation-delay:2s;"></div>
    <div class="leaf" style="left:80%; top:90px; animation-delay:3s;"></div>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
    <p>Scroll down to explore more</p>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <h2>Portfolio</h2>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About Me</h2>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2>Contact</h2>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Payment</h2>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }
</script>

</body>
</html>
