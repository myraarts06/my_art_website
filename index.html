<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 15px;
      position: relative;
      color: silver;
      margin-top: 100px;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
      position: relative;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* delays */
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }
    .l9 { animation-delay: 1.8s; }

    /* ===== LIGHT SWEEP EFFECT ===== */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
      );
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* shadow glow after animation */
    .title {
      text-shadow:
        3px 0px 10px rgba(255,255,255,0.15),
        8px 0px 20px rgba(255,255,255,0.05);
    }

    /* ================= SCROLL CONTENT ================= */

    .content {
      margin-top: 200px;
      width: 80%;
      max-width: 900px;
      text-align: center;
      opacity: 0.7;
    }

    /* ================= SOCIAL LINKS ================= */

    .social {
      margin-top: 150px;
      text-align: center;
    }

    .social a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.8;
    }

    .social a:hover {
      opacity: 1;
    }

    /* ================= HAMBURGER MENU ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
      transition: 0.3s;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      display: block;
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ================= PAGES ================= */

    .page {
      display: none;
      padding: 40px;
    }

    .page.active {
      display: block;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div class="home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
    <p>Scroll down to explore more</p>
  </div>

  <div class="social">
    <a href="https://instagram.com/YOUR_USERNAME" target="_blank">Instagram</a>
    <a href="https://linkedin.com/in/YOUR_PROFILE" target="_blank">LinkedIn</a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <h2>Portfolio</h2>
  <p>Coming soon...</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About Me</h2>
  <p>Myra Arts is a visual storytelling platform.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2>Contact</h2>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Payment</h2>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }
</script>

</body>
</html>
