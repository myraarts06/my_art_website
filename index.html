<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Instagram icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== MUSIC TOGGLE ===== */
    .music-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      background: #111;
      border: 1px solid white;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* LIGHT SWEEP */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* ===== SOCIAL ===== */
    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .social a {
      text-decoration: none;
      transition: 0.3s;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ===== MENU ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-btn:hover {
      background: white;
      color: black;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    /* ===== GALLERY ===== */
    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<!-- 🎵 AUDIO (no file needed - hosted classical loop) -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c1b6c2a7c.mp3?filename=peaceful-indian-flute-ambient-110764.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 MUSIC TOGGLE -->
<button class="music-toggle" onclick="toggleMusic()">Music: ON</button>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title" data-text="PORTFOLIO"></div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="photo" class="portfolio-content">
    <p>Photography coming soon...</p>
  </div>

  <div id="paint" class="portfolio-content">
    <div class="product-grid">
      <div class="product">
        <img src="images/art1.jpg">
      </div>
      <div class="product">
        <img src="images/art2.jpg">
      </div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <div class="title" data-text="ABOUT ME"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <div class="title" data-text="CONTACT"></div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <div class="title" data-text="PAYMENT"></div>
</div>

<script>
  const music = document.getElementById("bgMusic");
  let musicOn = true;

  // fade in music on load
  window.addEventListener("load", () => {
    music.volume = 0;
    music.play().catch(() => {});
    let vol = 0;
    const fade = setInterval(() => {
      if (vol < 0.4) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  });

  function toggleMusic() {
    const btn = document.querySelector(".music-toggle");

    if (musicOn) {
      music.pause();
      btn.innerText = "Music: OFF";
    } else {
      music.play();
      btn.innerText = "Music: ON";
    }

    musicOn = !musicOn;
  }

  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");

    animateTitle(document.getElementById(id));
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function animateTitle(page) {
    const title = page.querySelector(".title");
    if (!title) return;

    const text = title.getAttribute("data-text");
    if (!text) return;

    title.innerHTML = "";

    text.split("").forEach((char, index) => {
      const span = document.createElement("span");
      span.classList.add("letter");
      span.innerHTML = char === " " ? "&nbsp;" : char;

      setTimeout(() => {
        span.classList.add("drop");
      }, index * 120);

      title.appendChild(span);
    });
  }

  animateTitle(document.querySelector(".page.active"));
</script>

</body>
</html>
