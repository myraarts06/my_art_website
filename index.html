<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* ================= HOME ================= */
    .home {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .title {
      font-size: 60px;
      letter-spacing: 5px;
      color: silver;
      border-right: 2px solid silver;
      white-space: nowrap;
      overflow: hidden;
    }

    /* ================= SIDE PANEL ================= */
    .panel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 300px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.4s ease;
    }

    .panel.open {
      right: 0;
    }

    .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      color: black;
      padding: 8px 12px;
      cursor: pointer;
      border: none;
    }

    .panel a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 20px 0;
      font-size: 18px;
    }

    section {
      display: none;
      padding: 20px;
    }

    section.active {
      display: block;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px;
      background: white;
      color: black;
      text-decoration: none;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<!-- HOME -->
<div class="home">
  <div id="title" class="title"></div>
  <p>Creative Art & Photography</p>
</div>

<!-- MENU BUTTON -->
<button class="menu-btn" onclick="togglePanel()">Menu</button>

<!-- SIDE PANEL -->
<div class="panel" id="panel">

  <a href="#" onclick="showSection('portfolio')">Portfolio</a>
  <a href="#" onclick="showSection('about')">About</a>
  <a href="#" onclick="showSection('contact')">Contact</a>
  <a href="#" onclick="showSection('payment')">Payment</a>

  <!-- SECTIONS -->
  <section id="portfolio">
    <h2>Portfolio</h2>
    <h3>Paintings</h3>

    <img src="art1.jpg">
    <img src="art2.jpg">
  </section>

  <section id="about">
    <h2>About Me</h2>
    <p>Myra Arts is a creative visual expression.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="text" name="name" placeholder="Name"><br><br>
      <input type="email" name="email" placeholder="Email"><br><br>
      <textarea name="message" placeholder="Message"></textarea><br><br>
      <button class="btn" type="submit">Send</button>
    </form>
  </section>

  <section id="payment">
    <h2>Payment</h2>
    <a class="btn" href="YOUR_PAYPAL_LINK">Pay / Commission</a>
  </section>

</div>

<!-- SCRIPT -->
<script>
  // TYPEWRITER EFFECT (runs once)
  const text = "MYRA ARTS";
  let i = 0;
  function typeWriter() {
    if (i < text.length) {
      document.getElementById("title").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 150);
    } else {
      document.getElementById("title").style.borderRight = "none";
    }
  }
  typeWriter();

  // SIDE PANEL
  function togglePanel() {
    document.getElementById("panel").classList.toggle("open");
  }

  // SHOW SECTION
  function showSection(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
