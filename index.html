<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    #entryScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: pointer;
      text-align: center;
    }

    #entryScreen h1 {
      font-size: 26px;
      color: silver;
      letter-spacing: 3px;
    }

    #entryScreen p {
      opacity: 0.6;
    }

    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    #home .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    #home .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    .portfolio-content { display: none; margin-top: 40px; }
    .portfolio-content.active { display: block; }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }

    .contact-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .contact-form {
      width: 90%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border: 1px solid white;
      background: transparent;
      color: white;
      outline: none;
    }

    .contact-form button {
      padding: 12px;
      border: 1px solid white;
      background: white;
      color: black;
      cursor: pointer;
    }

    .shop-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 40px;
      margin-top: 40px;
      justify-items: center;
    }

    .shop-item {
      width: 220px;
      text-align: center;
    }

    .shop-item img {
      width: 100%;
      border-radius: 10px;
      transition: 0.3s;
    }

    .shop-item img:hover {
      transform: scale(1.05);
    }

    #cartIcon {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: black;
      border: 1px solid white;
      padding: 14px 18px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 10000;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 20px;
    }

    #paintingModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100000;
    }

    .modal-content {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      text-align: center;
    }

    .modal-content img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <h1>MYRA ARTS</h1>
  <p>Click to enter ✨</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">Music</button>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Shop</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">PORTFOLIO</div>

  <button onclick="showPortfolio('photo')">Photography</button>
  <button onclick="showPortfolio('paint')">Paintings</button>

  <div id="photo" class="portfolio-content">
    <p>Coming soon...</p>
  </div>

  <div id="paint" class="portfolio-content">
    <div class="product-grid">
      <div class="product">
        <img src="images/art1.jpg" onclick="openPainting('Sunset Dream','images/art1.jpg')">
      </div>
      <div class="product">
        <img src="images/art2.jpg" onclick="openPainting('Inner Thoughts','images/art2.jpg')">
      </div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <div class="title">ABOUT</div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <div class="title">CONTACT</div>
</div>

<!-- SHOP -->
<div id="payment" class="page">
  <div class="title">SHOP</div>

  <div id="cartIcon" onclick="openCart()">🛒 <span id="cartCount">0</span></div>

  <div class="shop-list">
    <div class="shop-item">
      <img src="images/art1.jpg">
      <h2>Sunset Dream</h2>
      <button onclick="addToCart('Sunset Dream',250,'images/art1.jpg',event)">Buy</button>
    </div>
  </div>
</div>

<!-- ✅ FIXED MODAL (MOVED OUTSIDE PAGES) -->
<div id="paintingModal">
  <div class="close-btn" onclick="closePainting()">×</div>
  <div class="modal-content">
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
  </div>
</div>

<script>
const music = document.getElementById("bgMusic");

document.getElementById("entryScreen").onclick = () => {
  document.getElementById("entryScreen").style.display = "none";
  music.play();
};

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showPortfolio(id){
  document.querySelectorAll(".portfolio-content").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openPainting(t,img){
  document.getElementById("modalTitle").innerText = t;
  document.getElementById("modalImg").src = img;
  document.getElementById("paintingModal").style.display="flex";
}

function closePainting(){
  document.getElementById("paintingModal").style.display="none";
}
</script>

</body>
</html>
