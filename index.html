<script>
  const music = document.getElementById("bgMusic");
  let musicOn = true;

  /* =========================
     ENTRY SCREEN
  ========================== */
  document.getElementById("entryScreen").addEventListener("click", async () => {
    document.getElementById("entryScreen").style.display = "none";

    try {
      music.volume = 0;
      await music.play();

      let v = 0;
      const fade = setInterval(() => {
        if (v < 0.4) {
          v += 0.05;
          music.volume = v;
        } else clearInterval(fade);
      }, 150);

    } catch (e) {}

    startHomeAnimation();
  });

  /* =========================
     HOME ANIMATION (UNCHANGED)
  ========================== */
  function startHomeAnimation() {
    const title = document.querySelector("#home .title");
    const text = title.getAttribute("data-text");

    title.innerHTML = "";

    text.split("").forEach((char, i) => {
      const span = document.createElement("span");
      span.classList.add("letter");
      span.innerHTML = char === " " ? "&nbsp;" : char;

      setTimeout(() => span.classList.add("drop"), i * 120);
      title.appendChild(span);
    });
  }

  /* =========================
     MUSIC
  ========================== */
  function toggleMusic() {
    if (musicOn) {
      music.pause();
      document.getElementById("musicBtn").innerText = "Music OFF";
    } else {
      music.play();
      document.getElementById("musicBtn").innerText = "Music ON";
    }
    musicOn = !musicOn;
  }

  /* =========================
     MENU
  ========================== */
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  /* =========================
     PORTFOLIO
  ========================== */
  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  /* =========================
     🖼️ PAINTING SPA FEATURE (ADDED ONLY)
  ========================== */

  let cartCount = 0;

  const paintings = {
    art1: {
      title: "Dreamscape",
      desc: "A surreal expression of emotions through abstract strokes.",
      size: "24x36 inches",
      price: "€250",
      img: "images/art1.jpg"
    },
    art2: {
      title: "Golden Silence",
      desc: "Minimalist piece inspired by calm landscapes.",
      size: "18x24 inches",
      price: "€180",
      img: "images/art2.jpg"
    }
  };

  function openPainting(id) {
    const p = paintings[id];

    document.getElementById("modalImg").src = p.img;
    document.getElementById("modalTitle").innerText = p.title;
    document.getElementById("modalDesc").innerText = p.desc;
    document.getElementById("modalSize").innerText = p.size;
    document.getElementById("modalPrice").innerText = p.price;

    document.getElementById("paintingModal").style.display = "flex";
  }

  function closePainting() {
    document.getElementById("paintingModal").style.display = "none";
  }

  function addToCart() {
    cartCount++;
    document.getElementById("cartInfo").innerText = "Cart: " + cartCount;
  }

</script>
