<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Modern sans-serif font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Instagram icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* ================= TITLE ================= */

    .title {
      font-size: 72px;
      letter-spacing: 10px;
      display: flex;
      gap: 15px;
      position: relative;
      margin-top: 100px;

      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      color: #d9d9d9;
      text-transform: uppercase;

      text-shadow:
        0 0 8px rgba(255,255,255,0.12),
        0 0 20px rgba(255,255,255,0.06);
    }

    /* 🌿 botanical glow swashes */
    .title::before,
    .title::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle,
        rgba(144, 238, 144, 0.25),
        transparent 70%
      );
      filter: blur(3px);
      opacity: 0.6;
      z-index: -1;
    }

    .title::before {
      left: -90px;
      top: -20px;
      transform: rotate(-25deg);
    }

    .title::after {
      right: -90px;
      top: 20px;
      transform: rotate(25deg);
    }

    /* ================= FALLING LETTER ANIMATION ================= */

    .letter {
      opacity: 0;
      transform: translateY(-220px) rotate(-10deg);
      animation: drop 1.2s forwards;
      position: relative;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-220px) rotate(-10deg); }
      70% { transform: translateY(15px) rotate(3deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* ================= CONTENT ================= */

    .content {
      margin-top: 200px;
      width: 80%;
      max-width: 900px;
      text-align: center;
      opacity: 0.7;
    }

    /* ================= SOCIAL ================= */

    .social {
      margin-top: 150px;
      text-align: center;
    }

    .social a {
      text-decoration: none;
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
      transition: 0.3s;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      display: block;
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ================= PAGES ================= */

    .page {
      display: none;
      padding: 40px;
    }

    .page.active {
      display: block;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div class="home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
    <p>Scroll down to explore more</p>
  </div>

  <!-- INSTAGRAM -->
  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <h2>Portfolio</h2>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About Me</h2>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2>Contact</h2>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Payment</h2>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }
</script>

</body>
</html>
