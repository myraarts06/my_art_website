<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== ENTRY SCREEN ===== */
    #entryScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: pointer;
      text-align: center;
    }

    #entryScreen h1 {
      font-size: 26px;
      color: silver;
      letter-spacing: 3px;
    }

    #entryScreen p {
      opacity: 0.6;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    /* ===== ONLY HOME ANIMATION ===== */
    #home .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    #home .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #home .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* ===== SOCIAL ===== */
    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .social a {
      transition: 0.3s;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ===== MENU ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* ===== MUSIC BUTTON ===== */
    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }

    /* ===== CONTACT FORM ===== */
    .contact-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .contact-form {
      width: 90%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border: 1px solid white;
      background: transparent;
      color: white;
      outline: none;
    }

    .contact-form button {
      padding: 12px;
      border: 1px solid white;
      background: white;
      color: black;
      cursor: pointer;
    }

    /* ===== NEW: PRODUCT PAGE (AMAZON STYLE) ===== */
    #productPage {
      display: none;
      padding: 60px;
      text-align: center;
    }

    #productPage.active {
      display: block;
    }

    .product-box {
      max-width: 600px;
      margin: auto;
    }

    .product-box img {
      width: 100%;
      border-radius: 10px;
    }

    .product-box h2 {
      margin-top: 20px;
    }

    .product-box p {
      margin: 5px 0;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
    }

    .add-cart {
      background: white;
      color: black;
    }

    .back-btn {
      background: transparent;
      color: white;
      border: 1px solid white;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<!-- ENTRY SCREEN -->
<div id="entryScreen">
  <h1>MYRA ARTS</h1>
  <p>Click to enter ✨</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<!-- MUSIC BUTTON -->
<button class="music-btn" onclick="toggleMusic()" id="musicBtn">Music ON</button>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">PORTFOLIO</div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="photo" class="portfolio-content">
    <p>Photography coming soon...</p>
  </div>

  <div id="paint" class="portfolio-content">
    <div class="product-grid">
      <img src="images/art1.jpg" onclick="openProduct('art1')">
      <img src="images/art2.jpg" onclick="openProduct('art2')">
    </div>
  </div>
</div>

<!-- PRODUCT PAGE -->
<div id="productPage">
  <button class="btn back-btn" onclick="backToPortfolio()">Back</button>
  <button class="btn add-cart">Add to Cart</button>

  <div class="product-box" id="productDetails"></div>
</div>

<!-- ABOUT -->
<div id="about" class="page"><div class="title">ABOUT ME</div></div>

<!-- CONTACT -->
<div id="contact" class="page">
  <div class="title">CONTACT</div>

  <div class="contact-container">
    <form class="contact-form" action="https://formspree.io/f/xqewvnrq" method="POST">
      <input type="text" name="name" required placeholder="Your Name">
      <input type="email" name="email" required placeholder="Your Email">
      <textarea name="message" required placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page"><div class="title">PAYMENT</div></div>

<script>
const music = document.getElementById("bgMusic");
let musicOn = true;

document.getElementById("entryScreen").onclick = async () => {
  document.getElementById("entryScreen").style.display = "none";
  await music.play();
  music.volume = 0.4;
};

function toggleMusic(){
  musicOn ? music.pause() : music.play();
  document.getElementById("musicBtn").innerText = musicOn ? "Music OFF" : "Music ON";
  musicOn = !musicOn;
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("productPage").style.display="none";
}

/* ===== AMAZON STYLE PRODUCT PAGE ===== */
function openProduct(id){
  document.getElementById("portfolio").classList.remove("active");
  document.getElementById("productPage").style.display="block";

  let data = {
    art1: {
      title:"Artwork Title: Nature Calm",
      desc:"Description: Peaceful landscape painting",
      size:"Size: 24x18 inches",
      price:"Price: €1000",
      img:"images/art1.jpg"
    },
    art2: {
      title:"Artwork Title: Buddha Painting",
      desc:"Description: Spiritual acrylic painting",
      size:"Size: 30x24 inches",
      price:"Price: €1200",
      img:"images/art2.jpg"
    }
  };

  let p = data[id];

  document.getElementById("productDetails").innerHTML = `
    <img src="${p.img}">
    <h2>${p.title}</h2>
    <p>${p.desc}</p>
    <p>${p.size}</p>
    <p>${p.price}</p>
  `;
}

function backToPortfolio(){
  document.getElementById("productPage").style.display="none";
  document.getElementById("portfolio").classList.add("active");
}

function showPortfolio(id){
  document.querySelectorAll(".portfolio-content").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
