<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* ================= PAGE SYSTEM ================= */

    .page {
      display: none !important;
      padding: 40px;
      min-height: 100vh;
    }

    .page.active {
      display: block !important;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 15px;
      color: silver;
      margin-top: 100px;
      justify-content: center;
      width: 100%;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* LIGHT SWEEP (RESTORED) */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* ================= SOCIAL ================= */

    .social {
      margin-top: 150px;
      text-align: center;
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open { right: 0; }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover { background: #222; }

    /* ================= PORTFOLIO ================= */

    .portfolio-content {
      display: none;
      margin-top: 30px;
    }

    .portfolio-content.active {
      display: block;
    }

    /* ================= GALLERY ================= */

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .artwork {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      background: #111;
    }

    .artwork img {
      width: 100%;
      transition: 0.5s;
    }

    .artwork:hover img {
      transform: scale(1.08);
    }

    .label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    .artwork:hover .label { opacity: 1; }

    .artwork button {
      width: 100%;
      padding: 10px;
      border: none;
      cursor: pointer;
      background: white;
    }

    /* ================= CART ================= */

    .cart-icon {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #111;
      padding: 10px 15px;
      cursor: pointer;
      z-index: 2000;
    }

    .music-btn {
      position: fixed;
      top: 70px;
      left: 20px;
      background: #111;
      padding: 10px 15px;
      cursor: pointer;
      z-index: 2000;
    }

    .cart-panel {
      position: fixed;
      right: -350px;
      top: 0;
      width: 300px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.4s;
      z-index: 3000;
      overflow-y: auto;
    }

    .cart-panel.open {
      right: 0;
    }

    /* ================= LIGHTBOX ================= */

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: rgba(0,0,0,0.95);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }

  </style>
</head>

<body>

<!-- CART + MUSIC -->
<div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
<div class="music-btn" onclick="toggleMusic()">🎵</div>

<audio id="music" loop>
  <source src="music/classical.mp3" type="audio/mp3">
</audio>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
</div>

<!-- HOME -->
<div id="home" class="page active home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">

  <h2>Portfolio</h2>

  <button onclick="show('paint')">Paintings</button>
  <button onclick="show('photo')">Photography</button>

  <div id="paint" class="portfolio-content">

    <div class="gallery">

      <div class="artwork">
        <img src="images/painting1.jpg">
        <div class="label">Painting 1</div>
        <button onclick="addToCart('Painting 1', 12000)">Add to Cart</button>
      </div>

      <div class="artwork">
        <img src="images/painting2.jpg">
        <div class="label">Painting 2</div>
        <button onclick="addToCart('Painting 2', 15000)">Add to Cart</button>
      </div>

    </div>

  </div>

  <div id="photo" class="portfolio-content">
    Photography section coming soon...
  </div>

</div>

<!-- CART -->
<div id="cart" class="cart-panel">
  <h3>Your Cart</h3>
  <div id="items"></div>
  <p id="total"></p>
  <button onclick="clearCart()">Clear</button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lbimg">
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  update();
}

function update(){
  document.getElementById("cart-count").innerText = cart.length;
  let html = "";
  let total = 0;
  cart.forEach((c,i)=>{
    html += `<div>${c.name} - ₹${c.price}</div>`;
    total += c.price;
  });
  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function clearCart(){
  cart = [];
  localStorage.setItem("cart", JSON.stringify(cart));
  update();
}

function toggleMusic(){
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function show(id){
  document.querySelectorAll(".portfolio-content").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openLight(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lbimg").src=src;
}

update();
</script>

</body>
</html>
