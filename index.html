<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== ENTRY SCREEN ===== */
    #entryScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: pointer;
      text-align: center;
    }

    #entryScreen h1 {
      font-size: 26px;
      color: silver;
      letter-spacing: 3px;
    }

    #entryScreen p {
      opacity: 0.6;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    #home .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    #home .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #home .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* ===== PRODUCT DETAIL PAGE ===== */
    .product-page {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding-top: 40px;
    }

    .product-page.active {
      display: flex;
    }

    .product-page img {
      width: 350px;
      border-radius: 10px;
    }

    .back-btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      cursor: pointer;
    }

    .cart-btn {
      padding: 10px 20px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    /* ===== OTHER UI ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }
  </style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <h1>MYRA ARTS</h1>
  <p>Click to enter ✨</p>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">Music ON</button>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">PORTFOLIO</div>

  <div class="portfolio-content active">
    <div class="product-grid">

      <div class="product" onclick="openProduct('art1')">
        <img src="images/art1.jpg">
      </div>

      <div class="product" onclick="openProduct('art2')">
        <img src="images/art2.jpg">
      </div>

    </div>
  </div>
</div>

<!-- PRODUCT PAGE -->
<div id="productPage" class="page product-page">

  <img id="pImg">
  <h2 id="pTitle"></h2>
  <p id="pDesc"></p>
  <p id="pSize"></p>
  <p id="pPrice"></p>

  <button class="cart-btn">Add to Cart</button>
  <button class="back-btn" onclick="backToPortfolio()">Back</button>
</div>

<script>
  const music = document.getElementById("bgMusic");
  let musicOn = true;

  document.getElementById("entryScreen").addEventListener("click", async () => {
    document.getElementById("entryScreen").style.display = "none";
    music.play();
    animateHome();
  });

  function animateHome() {
    const title = document.querySelector("#home .title");
    const text = title.getAttribute("data-text");

    title.innerHTML = "";

    text.split("").forEach((c, i) => {
      const s = document.createElement("span");
      s.classList.add("letter");
      s.innerHTML = c === " " ? "&nbsp;" : c;
      setTimeout(() => s.classList.add("drop"), i * 120);
      title.appendChild(s);
    });
  }

  function openProduct(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("productPage").classList.add("active");

    if (id === "art1") {
      document.getElementById("pImg").src = "images/art1.jpg";
      document.getElementById("pTitle").innerText = "Artwork 1 Title";
      document.getElementById("pDesc").innerText = "Beautiful hand-painted artwork.";
      document.getElementById("pSize").innerText = "Size: 40x60 cm";
      document.getElementById("pPrice").innerText = "Price: €900";
    }

    if (id === "art2") {
      document.getElementById("pImg").src = "images/art2.jpg";
      document.getElementById("pTitle").innerText = "Buddha Painting";
      document.getElementById("pDesc").innerText = "Spiritual Buddha-inspired artwork.";
      document.getElementById("pSize").innerText = "Size: 50x70 cm";
      document.getElementById("pPrice").innerText = "Price: €1200";
    }
  }

  function backToPortfolio() {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("portfolio").classList.add("active");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function toggleMusic() {
    if (musicOn) music.pause();
    else music.play();
    musicOn = !musicOn;
  }
</script>

</body>
</html>
