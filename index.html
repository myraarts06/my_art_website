<!-- EVERYTHING ABOVE REMAINS SAME UNTIL PORTFOLIO SECTION -->

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">PORTFOLIO</div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="photo" class="portfolio-content">
    <p>Photography coming soon...</p>
  </div>

  <!-- PAINTINGS GRID (NOW DYNAMIC) -->
  <div id="paint" class="portfolio-content">
    <div class="product-grid" id="paintGrid"></div>
  </div>
</div>

<!-- PRODUCT DETAIL PAGE (NEW SPA VIEW) -->
<div id="productPage" class="page">
  <button class="portfolio-btn" onclick="goBack()">← Back</button>

  <div id="productDetail" style="max-width:800px;margin:40px auto;text-align:left;"></div>
</div>

<!-- CART BUTTON -->
<button class="music-btn" style="left:20px;right:auto;" onclick="toggleCart()">
  Cart 🛒 (<span id="cartCount">0</span>)
</button>

<!-- CART PANEL -->
<div id="cartPanel" class="sidepanel">
  <h3 style="color:white;padding-left:20px;">Your Cart</h3>
  <div id="cartItems" style="padding:20px;color:white;"></div>
</div>

<script>
  const music = document.getElementById("bgMusic");
  let musicOn = true;

  /* =========================
     PAINTINGS DATA (CLEAN STRUCTURE)
  ========================== */
  const paintings = [
    {
      id: 1,
      title: "Sunset Dreams",
      image: "images/art1.jpg",
      description: "A calming sunset over abstract waves.",
      size: "24 x 36 inches",
      price: 120
    },
    {
      id: 2,
      title: "Golden Forest",
      image: "images/art2.jpg",
      description: "Nature-inspired textured acrylic painting.",
      size: "20 x 30 inches",
      price: 150
    }
  ];

  let lastScroll = 0;

  /* =========================
     ENTRY SCREEN
  ========================== */
  document.getElementById("entryScreen").addEventListener("click", async () => {
    document.getElementById("entryScreen").style.display = "none";

    try {
      music.volume = 0;
      await music.play();

      let v = 0;
      const fade = setInterval(() => {
        if (v < 0.4) {
          v += 0.05;
          music.volume = v;
        } else clearInterval(fade);
      }, 150);

    } catch (e) {}

    startHomeAnimation();
    renderPaintings();
    updateCartUI();
  });

  /* =========================
     HOME ANIMATION
  ========================== */
  function startHomeAnimation() {
    const title = document.querySelector("#home .title");
    const text = title.getAttribute("data-text");

    title.innerHTML = "";

    text.split("").forEach((char, i) => {
      const span = document.createElement("span");
      span.classList.add("letter");
      span.innerHTML = char === " " ? "&nbsp;" : char;

      setTimeout(() => span.classList.add("drop"), i * 120);
      title.appendChild(span);
    });
  }

  /* =========================
     RENDER PAINTINGS
  ========================== */
  function renderPaintings() {
    const grid = document.getElementById("paintGrid");
    grid.innerHTML = "";

    paintings.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `<img src="${p.image}" onclick="openProduct(${p.id})">`;
      grid.appendChild(div);
    });
  }

  /* =========================
     SPA NAVIGATION
  ========================== */
  function openProduct(id) {
    lastScroll = window.scrollY;

    const product = paintings.find(p => p.id === id);

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("productPage").classList.add("active");

    document.getElementById("productDetail").innerHTML = `
      <h2>${product.title}</h2>
      <img src="${product.image}" style="width:100%;max-width:500px;border-radius:10px;">
      <p><b>Description:</b> ${product.description}</p>
      <p><b>Size:</b> ${product.size}</p>
      <p><b>Price:</b> €${product.price}</p>

      <button class="portfolio-btn" onclick="addToCart(${product.id})">
        Add to Cart
      </button>
    `;
  }

  function goBack() {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("portfolio").classList.add("active");

    window.scrollTo(0, lastScroll);
  }

  /* =========================
     CART SYSTEM
  ========================== */
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function addToCart(id) {
    const item = paintings.find(p => p.id === id);
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartUI();
    alert("Added to cart!");
  }

  function updateCartUI() {
    document.getElementById("cartCount").innerText = cart.length;

    const cartItems = document.getElementById("cartItems");
    cartItems.innerHTML = "";

    cart.forEach((c, i) => {
      const div = document.createElement("div");
      div.style.marginBottom = "10px";
      div.innerHTML = `
        ${c.title} - €${c.price}
        <button onclick="removeItem(${i})">x</button>
      `;
      cartItems.appendChild(div);
    });
  }

  function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartUI();
  }

  function toggleCart() {
    document.getElementById("cartPanel").classList.toggle("open");
  }

  /* =========================
     EXISTING FUNCTIONS (UNCHANGED)
  ========================== */
  function toggleMusic() {
    if (musicOn) {
      music.pause();
      document.getElementById("musicBtn").innerText = "Music OFF";
    } else {
      music.play();
      document.getElementById("musicBtn").innerText = "Music ON";
    }
    musicOn = !musicOn;
  }

  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }
</script>
