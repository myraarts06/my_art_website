<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* ========== PAGE SYSTEM ========== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    /* ========== TITLE SYSTEM (FIXED) ========== */
    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    /* animation only when page is active */
    .page.active .letter {
      animation: drop 1s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 1.8s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* delays */
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* SOCIAL CENTER FIX */
    .social {
      margin-top: 120px;
      display: flex;
      justify-content: center;
    }

    .social a {
      transition: 0.3s;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* MENU */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open { right: 0; }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* GALLERY */
    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      transition: 0.4s;
    }

    .product img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title">
    <span class="letter l1">P</span>
    <span class="letter l2">O</span>
    <span class="letter l3">R</span>
    <span class="letter l4">T</span>
    <span class="letter l5">F</span>
    <span class="letter l6">O</span>
    <span class="letter l7">L</span>
    <span class="letter l8">I</span>
    <span class="letter l1">O</span>
  </div>

  <div class="product-grid">
    <div class="product">
      <img src="images/art1.jpg">
    </div>
    <div class="product">
      <img src="images/art2.jpg">
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <div class="title">
    <span class="letter l1">A</span>
    <span class="letter l2">B</span>
    <span class="letter l3">O</span>
    <span class="letter l4">U</span>
    <span class="letter l5">T</span>
    <span style="width:20px;"></span>
    <span class="letter l6">M</span>
    <span class="letter l7">E</span>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <div class="title">
    <span class="letter l1">C</span>
    <span class="letter l2">O</span>
    <span class="letter l3">N</span>
    <span class="letter l4">T</span>
    <span class="letter l5">A</span>
    <span class="letter l6">C</span>
    <span class="letter l7">T</span>
  </div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <div class="title">
    <span class="letter l1">P</span>
    <span class="letter l2">A</span>
    <span class="letter l3">Y</span>
    <span class="letter l4">M</span>
    <span class="letter l5">E</span>
    <span class="letter l6">N</span>
    <span class="letter l7">T</span>
  </div>
</div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }
</script>

</body>
</html>
