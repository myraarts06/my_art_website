<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Instagram icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none !important;
      padding: 40px;
      min-height: 100vh;
    }

    .page.active {
      display: block !important;
    }

    /* ===== HOME ===== */
    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 15px;
      color: silver;
      margin-top: 100px;
      justify-content: center;
      width: 100%;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* light sweep */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .content {
      margin-top: 200px;
      text-align: center;
      opacity: 0.7;
    }

    /* ===== SOCIAL ===== */
    .social {
      margin-top: 150px;
    }

    .social a {
      text-decoration: none;
      transition: 0.3s;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ===== MENU ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-wrapper {
      text-align: center;
    }

    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-btn:hover {
      background: white;
      color: black;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    /* ===== GALLERY ===== */
    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      transition: 0.4s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
</div>

<!-- HOME -->
<div id="home" class="page active home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">

  <div class="portfolio-wrapper">

    <!-- Animated title -->
    <div class="title">
      <span class="letter l1">P</span>
      <span class="letter l2">O</span>
      <span class="letter l3">R</span>
      <span class="letter l4">T</span>
      <span class="letter l5">F</span>
      <span class="letter l6">O</span>
      <span class="letter l7">L</span>
      <span class="letter l8">I</span>
      <span class="letter l1">O</span>
    </div>

    <div class="portfolio-options">
      <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
      <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
    </div>

    <div id="photo" class="portfolio-content">
      <p>Photography coming soon...</p>
    </div>

    <div id="paint" class="portfolio-content">

      <div class="product-grid">

        <div class="product">
          <img src="images/art1.jpg">
        </div>

        <div class="product">
          <img src="images/art2.jpg">
        </div>

      </div>

    </div>

  </div>

</div>

<!-- OTHER -->
<div id="about" class="page"><h2>About Me</h2></div>
<div id="contact" class="page"><h2>Contact</h2></div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");

    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
