<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ================= PAGE SYSTEM ================= */

    .page {
      display: none;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .page.active {
      display: block;
    }

    /* ================= KEEP YOUR HOMEPAGE DESIGN ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 15px;
      position: relative;
      color: silver;
      margin-top: 100px;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
      position: relative;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
      );
      transform: skewX(-25deg);
      animation: lightSweep 2s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lightSweep {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .content {
      margin-top: 200px;
      text-align: center;
      opacity: 0.7;
    }

    .social {
      margin-top: 150px;
      text-align: center;
    }

    .social a {
      text-decoration: none;
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ================= PORTFOLIO ================= */

    .portfolio-container {
      text-align: center;
    }

    .portfolio-buttons {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 12px 25px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .content-box {
      display: none;
      margin-top: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      max-height: 60vh;
      overflow-y: auto;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 20px;
    }

    .content-box.active {
      display: block;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('portfolio')">Portfolio</button>
  <button onclick="showPage('about')">About</button>
  <button onclick="showPage('contact')">Contact</button>
  <button onclick="showPage('payment')">Payment</button>
</div>

<!-- HOME PAGE (UNCHANGED DESIGN) -->
<div id="home" class="page active home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO PAGE -->
<div id="portfolio" class="page">

  <div class="portfolio-container">
    <h1>Portfolio</h1>

    <div class="portfolio-buttons">
      <button class="btn" onclick="toggleContent('photos')">Photographs</button>
      <button class="btn" onclick="toggleContent('paintings')">Paintings</button>
    </div>

    <div id="photos" class="content-box">
      <h2>Photographs</h2>
      <p>Add your photography here...</p>
      <p>Scroll content area...</p>
    </div>

    <div id="paintings" class="content-box">
      <h2>Paintings</h2>
      <p>Add your paintings here...</p>
      <p>Scroll content area...</p>
    </div>

  </div>

</div>

<!-- OTHER PAGES -->
<div id="about" class="page"><h2>About Me</h2></div>
<div id="contact" class="page"><h2>Contact</h2></div>
<div id="payment" class="page"><h2>Payment</h2></div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }

  function toggleContent(id) {
    document.querySelectorAll(".content-box").forEach(c => c.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
