<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ================= HEADER HOME ================= */

    .home {
      min-height: 120vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      position: relative;
    }

    /* LIGHT FROM RIGHT SIDE EFFECT */
    .title {
      font-size: 70px;
      letter-spacing: 5px;
      color: silver;
      position: relative;

      text-shadow:
        8px 0px 15px rgba(255,255,255,0.25),
        3px 0px 5px rgba(255,255,255,0.2),
        -2px 0px 10px rgba(0,0,0,0.8);
    }

    /* moving light sweep */
    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -50%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.25),
        transparent
      );
      animation: lightSweep 3s infinite;
    }

    @keyframes lightSweep {
      0% { left: -50%; }
      100% { left: 120%; }
    }

    /* ================= HAMBURGER MENU ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 30px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 3px;
      background: white;
      margin: 6px 0;
      transition: 0.3s;
    }

    /* ================= SIDE PANEL ================= */

    .panel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s ease;
      z-index: 999;
    }

    .panel button {
      width: 100%;
      background: none;
      border: none;
      color: white;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
    }

    .panel button:hover {
      background: #222;
    }

    .panel.active {
      right: 0;
    }

    /* ================= SECTIONS ================= */

    section {
      min-height: 100vh;
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      color: silver;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    .btn {
      padding: 10px 15px;
      background: silver;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="togglePanel()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">
  <button onclick="scrollToSection('portfolio')">Portfolio</button>
  <button onclick="scrollToSection('about')">About</button>
  <button onclick="scrollToSection('contact')">Contact</button>
  <button onclick="scrollToSection('payment')">Payment</button>
</div>

<!-- HOME -->
<div class="home">
  <div class="title">MYRA ARTS</div>
  <p>Creative Visual Expression</p>
</div>

<!-- PORTFOLIO -->
<section id="portfolio">
  <h2>Portfolio</h2>

  <h3>Photography</h3>
  <div class="grid">
    <div class="card">Coming soon</div>
  </div>

  <h3>Paintings</h3>
  <div class="grid">
    <div class="card"><img src="art1.jpg"></div>
    <div class="card"><img src="art2.jpg"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p style="text-align:center;">
    Myra Arts is a visual storytelling space.
  </p>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/YOUR_ID" method="POST">
    <input type="text" name="name" placeholder="Name">
    <input type="email" name="email" placeholder="Email">
    <textarea name="message" placeholder="Message"></textarea>
    <button class="btn" type="submit">Send</button>
  </form>
</section>

<!-- PAYMENT -->
<section id="payment">
  <h2>Payment</h2>
  <p style="text-align:center;">Commission artwork</p>
  <div style="text-align:center;">
    <button class="btn">Pay Now</button>
  </div>
</section>

<script>
  function togglePanel() {
    document.getElementById("panel").classList.toggle("active");
  }

  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    togglePanel();
  }
</script>

</body>
</html>
