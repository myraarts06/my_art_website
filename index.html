<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== PAGE SYSTEM ===== */
    .page {
      display: none;
      padding: 40px;
      min-height: 100vh;
      text-align: center;
    }

    .page.active {
      display: block;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 60px;
      letter-spacing: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      color: silver;
      margin-top: 80px;
      position: relative;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
    }

    .drop {
      animation: drop 0.8s forwards;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== SOCIAL ===== */
    .social {
      margin-top: 100px;
      display: flex;
      justify-content: center;
    }

    .social a {
      transition: 0.3s;
    }

    .social a:hover {
      transform: scale(1.2);
    }

    /* ===== MENU ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 10000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.4s;
      z-index: 9999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-options {
      margin-top: 40px;
    }

    .portfolio-btn {
      padding: 10px 20px;
      border: 1px solid white;
      background: none;
      color: white;
      margin: 10px;
      cursor: pointer;
    }

    .portfolio-btn:hover {
      background: white;
      color: black;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
    }

    .portfolio-content.active {
      display: block;
    }

    .product-grid {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .product img {
      width: 250px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    /* ===== MUSIC BUTTON ===== */
    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border: 1px solid white;
      background: black;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }

    /* ===== CONTACT FORM (FULL PAGE FIX) ===== */
    .contact-form {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 60vh; /* spreads form vertically */
    }

    .contact-form input,
    .contact-form textarea {
      width: 80%;
      max-width: 500px;
      padding: 14px;
      background: black;
      border: 1px solid white;
      color: white;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    .contact-form textarea {
      resize: none;
    }

    .contact-form button {
      padding: 12px 25px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .contact-form button:hover {
      background: white;
      color: black;
    }

  </style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<!-- MUSIC BUTTON -->
<button class="music-btn" onclick="toggleMusic()">Music</button>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About Me</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="title" data-text="MYRA ARTS"></div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <div class="title" data-text="PORTFOLIO"></div>

  <div class="portfolio-options">
    <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
    <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
  </div>

  <div id="photo" class="portfolio-content">
    <p>Photography coming soon...</p>
  </div>

  <div id="paint" class="portfolio-content">
    <div class="product-grid">
      <div class="product"><img src="images/art1.jpg"></div>
      <div class="product"><img src="images/art2.jpg"></div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <div class="title" data-text="ABOUT ME"></div>
</div>

<!-- CONTACT (FIXED FULL PAGE + REQUIRED FIELDS) -->
<div id="contact" class="page">
  <div class="title" data-text="CONTACT"></div>

  <form class="contact-form" action="https://formspree.io/f/xqewvnrq" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="8" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

  </form>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <div class="title" data-text="PAYMENT"></div>
</div>

<script>
  const music = document.getElementById("bgMusic");
  let isPlaying = false;

  function toggleMusic() {
    if (!isPlaying) {
      music.play();
      isPlaying = true;
    } else {
      music.pause();
      isPlaying = false;
    }
  }

  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");

    animateTitle(document.getElementById(id));

    if (id === "portfolio") {
      showPortfolio("photo");
    }
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function animateTitle(page) {
    const title = page.querySelector(".title");
    if (!title) return;

    const text = title.getAttribute("data-text");
    if (!text) return;

    title.innerHTML = "";

    text.split("").forEach((char, i) => {
      const span = document.createElement("span");
      span.classList.add("letter");
      span.innerHTML = char === " " ? "&nbsp;" : char;

      setTimeout(() => {
        span.classList.add("drop");
      }, i * 120);

      title.appendChild(span);
    });
  }

  animateTitle(document.querySelector(".page.active"));
</script>

</body>
</html>
