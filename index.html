<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Instagram icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ================= PAGE SYSTEM ================= */

    .page {
      display: none !important;
      padding: 40px;
      min-height: 100vh;
    }

    .page.active {
      display: block !important;
    }

    /* ================= HOME ================= */

    .home {
      min-height: 120vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 15px;
      position: relative;
      color: silver;
      margin-top: 100px;

      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
      position: relative;
    }

    @keyframes drop {
      0% { opacity: 0; transform: translateY(-200px); }
      70% { transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    .content {
      margin-top: 200px;
      width: 80%;
      max-width: 900px;
      text-align: center;
      opacity: 0.7;
    }

    /* ================= SOCIAL ================= */

    .social {
      margin-top: 150px;
      text-align: center;
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open {
      right: 0;
    }

    .sidepanel button {
      display: block;
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover {
      background: #222;
    }

    /* ================= PORTFOLIO ================= */

    .portfolio-wrapper {
      text-align: center;
    }

    .portfolio-options {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .portfolio-btn {
      padding: 12px 25px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .portfolio-btn:hover {
      background: white;
      color: black;
    }

    .portfolio-content {
      display: none;
      margin-top: 40px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      max-height: 70vh;
      overflow-y: auto;
    }

    .portfolio-content.active {
      display: block;
    }

    /* ================= MUSEUM GALLERY ================= */

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 30px;
    }

    .artwork {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      cursor: pointer;
      background: #111;
    }

    .artwork img {
      width: 100%;
      display: block;
      transition: transform 0.6s ease, filter 0.6s ease;
      filter: brightness(0.9);
    }

    .artwork:hover img {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    .label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 14px;
      opacity: 0;
      transition: 0.3s;
    }

    .artwork:hover .label {
      opacity: 1;
    }

    .artwork::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4));
      opacity: 0;
      transition: 0.4s;
    }

    .artwork:hover::after {
      opacity: 1;
    }

    /* ================= LIGHTBOX ================= */

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      box-shadow: 0 0 40px rgba(255,255,255,0.1);
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- HOME -->
<div id="home" class="page active home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span style="width:20px;"></span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

  <div class="content">
    <p>Welcome to My Creative Space</p>
  </div>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">

  <div class="portfolio-wrapper">

    <h2>Portfolio</h2>

    <div class="portfolio-options">
      <button class="portfolio-btn" onclick="showPortfolio('photo')">Photography</button>
      <button class="portfolio-btn" onclick="showPortfolio('paint')">Paintings</button>
    </div>

    <div id="photo" class="portfolio-content">
      <h3>Photography</h3>
      <p>Add photography here...</p>
    </div>

    <div id="paint" class="portfolio-content">

      <h3>Paintings</h3>

      <div class="gallery">

        <div class="artwork" onclick="openLightbox('images/painting1.jpg')">
          <img src="images/painting1.jpg">
          <div class="label">Painting 1</div>
        </div>

        <div class="artwork" onclick="openLightbox('images/painting2.jpg')">
          <img src="images/painting2.jpg">
          <div class="label">Painting 2</div>
        </div>

      </div>

    </div>

  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<!-- OTHER PAGES -->
<div id="about" class="page"><h2>About Me</h2></div>
<div id="contact" class="page"><h2>Contact</h2></div>
<div id="payment" class="page"><h2>Payment</h2></div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function openPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");

    document.querySelectorAll(".portfolio-content").forEach(el => {
      el.classList.remove("active");
    });
  }

  function showPortfolio(id) {
    document.querySelectorAll(".portfolio-content").forEach(el => {
      el.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
  }

  function openLightbox(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }
</script>

</body>
</html>
