<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* ================= PAGES SYSTEM ================= */

    .page {
      display: none;
      min-height: 100vh;
      padding: 60px 30px;
    }

    .page.active {
      display: block;
    }

    /* ================= TITLE ================= */

    .title {
      font-size: 72px;
      letter-spacing: 10px;
      display: flex;
      gap: 15px;
      position: relative;
      margin-top: 100px;

      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      color: #d9d9d9;
      text-transform: uppercase;
    }

    /* ================= HOME ================= */

    .home {
      text-align: center;
    }

    /* ================= PORTFOLIO ================= */

    .portfolio-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .portfolio-buttons {
      display: flex;
      gap: 30px;
      margin-top: 40px;
    }

    .btn {
      padding: 15px 30px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 18px;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .content-box {
      display: none;
      margin-top: 40px;
      width: 80%;
      max-width: 900px;
      max-height: 60vh;
      overflow-y: auto;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 20px;
    }

    .content-box.active {
      display: block;
    }

    /* ================= HAMBURGER ================= */

    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 35px;
      cursor: pointer;
      z-index: 1000;
    }

    .bar {
      height: 4px;
      background: white;
      margin: 6px 0;
    }

    /* ================= SIDE PANEL ================= */

    .sidepanel {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100vh;
      background: #111;
      padding-top: 80px;
      transition: 0.5s;
      z-index: 999;
    }

    .sidepanel.open { right: 0; }

    .sidepanel button {
      width: 100%;
      padding: 20px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidepanel button:hover { background: #222; }

    /* ================= SOCIAL ================= */

    .social {
      margin-top: 120px;
    }

  </style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- SIDE MENU -->
<div id="menu" class="sidepanel">
  <button onclick="showPage('portfolio')">Portfolio</button>
  <button onclick="showPage('about')">About</button>
  <button onclick="showPage('contact')">Contact</button>
  <button onclick="showPage('payment')">Payment</button>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active home">

  <div class="title">
    MYRA ARTS
  </div>

  <p>Welcome to My Creative Space</p>

  <div class="social">
    <a href="https://www.instagram.com/myraarts06/" target="_blank">
      <i class="fa-brands fa-instagram" style="font-size:45px; color:#E1306C;"></i>
    </a>
  </div>

</div>

<!-- PORTFOLIO PAGE -->
<div id="portfolio" class="page">

  <div class="portfolio-container">

    <h1>Portfolio</h1>

    <div class="portfolio-buttons">
      <button class="btn" onclick="toggleContent('photos')">Photographs</button>
      <button class="btn" onclick="toggleContent('paintings')">Paintings</button>
    </div>

    <!-- PHOTOS -->
    <div id="photos" class="content-box">
      <h2>Photographs</h2>
      <p>Add your photography collection here...</p>
      <p>Scroll content will go here...</p>
      <p>More images...</p>
    </div>

    <!-- PAINTINGS -->
    <div id="paintings" class="content-box">
      <h2>Paintings</h2>
      <p>Add your paintings collection here...</p>
      <p>Scroll content will go here...</p>
      <p>More artworks...</p>
    </div>

  </div>

</div>

<!-- OTHER PAGES -->
<div id="about" class="page"><h2>About Me</h2></div>
<div id="contact" class="page"><h2>Contact</h2></div>
<div id="payment" class="page"><h2>Payment</h2></div>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
  }

  function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById("menu").classList.remove("open");
  }

  function toggleContent(id) {
    document.querySelectorAll(".content-box").forEach(c => c.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
