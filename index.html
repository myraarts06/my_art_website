<script>
const music = document.getElementById("bgMusic");
let musicOn = true;

/* =========================
   PAINTINGS DATA (CLEAN STRUCTURE)
========================= */
const paintings = [
  {
    id: 1,
    title: "Sunset Dreams",
    image: "images/art1.jpg",
    description: "A calming sunset over abstract waves.",
    size: "24 x 36 inches",
    price: 120
  },
  {
    id: 2,
    title: "Golden Forest",
    image: "images/art2.jpg",
    description: "Nature-inspired textured acrylic painting.",
    size: "20 x 30 inches",
    price: 150
  }
];

/* =========================
   CART STATE
========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* =========================
   ENTRY SCREEN
========================= */
document.getElementById("entryScreen").addEventListener("click", async () => {
  document.getElementById("entryScreen").style.display = "none";

  try {
    music.volume = 0;
    await music.play();

    let v = 0;
    const fade = setInterval(() => {
      if (v < 0.4) {
        v += 0.05;
        music.volume = v;
      } else clearInterval(fade);
    }, 150);

  } catch (e) {}

  startHomeAnimation();
  renderPaintings();
  updateCartUI();
});

/* =========================
   HOME ANIMATION
========================= */
function startHomeAnimation() {
  const title = document.querySelector("#home .title");
  const text = title.getAttribute("data-text");

  title.innerHTML = "";

  text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.classList.add("letter");
    span.innerHTML = char === " " ? "&nbsp;" : char;

    setTimeout(() => span.classList.add("drop"), i * 120);
    title.appendChild(span);
  });
}

/* =========================
   PAINTINGS GRID RENDER
========================= */
function renderPaintings() {
  const grid = document.getElementById("paintGrid");
  if (!grid) return;

  grid.innerHTML = "";

  paintings.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${p.image}" onclick="openPainting(${p.id})">
    `;

    grid.appendChild(div);
  });
}

/* =========================
   OPEN PAINTING (INLINE DETAIL VIEW)
========================= */
function openPainting(id) {
  const p = paintings.find(item => item.id === id);

  const paintSection = document.getElementById("paint");

  paintSection.innerHTML = `
    <button class="portfolio-btn" onclick="renderPaintings()">
      ← Back to Paintings
    </button>

    <div style="max-width:650px;margin:30px auto;text-align:left;">
      <img src="${p.image}" style="width:100%;border-radius:10px;">

      <h2 style="margin-top:15px;">${p.title}</h2>

      <p><b>Description:</b><br>${p.description}</p>
      <p><b>Size:</b><br>${p.size}</p>
      <p><b>Price:</b><br>€${p.price}</p>

      <button class="portfolio-btn" onclick="addToCart(${p.id})">
        Add to Cart
      </button>
    </div>
  `;
}

/* =========================
   BACK TO GRID VIEW
========================= */
function renderPaintings() {
  const paintSection = document.getElementById("paint");

  paintSection.innerHTML = `
    <div class="product-grid" id="paintGrid"></div>
  `;

  const grid = document.getElementById("paintGrid");

  paintings.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${p.image}" onclick="openPainting(${p.id})">
    `;

    grid.appendChild(div);
  });
}

/* =========================
   CART SYSTEM (MINI STORE)
========================= */
function addToCart(id) {
  const item = paintings.find(p => p.id === id);
  cart.push(item);

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();

  alert("Added to cart ✔");
}

function updateCartUI() {
  const counter = document.getElementById("cartCount");
  if (counter) counter.innerText = cart.length;
}

/* Simple cart view (can be expanded later) */
function toggleCart() {
  const items = cart.map(c => `${c.title} - €${c.price}`).join("\n");
  alert(cart.length ? items : "Cart is empty");
}

/* =========================
   MUSIC TOGGLE
========================= */
function toggleMusic() {
  if (musicOn) {
    music.pause();
    document.getElementById("musicBtn").innerText = "Music OFF";
  } else {
    music.play();
    document.getElementById("musicBtn").innerText = "Music ON";
  }
  musicOn = !musicOn;
}

/* =========================
   MENU
========================= */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

function openPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  // restore paintings when coming back
  if (id === "portfolio") {
    const paint = document.getElementById("paint");
    if (paint) {
      paint.innerHTML = `<div class="product-grid" id="paintGrid"></div>`;
      renderPaintings();
    }
  }
}

function showPortfolio(id) {
  document.querySelectorAll(".portfolio-content").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "paint") {
    renderPaintings();
  }
}
</script>
