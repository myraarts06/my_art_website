<!DOCTYPE html>
<html>
<head>
  <title>Myra Arts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    /* ================= HOME ================= */

    .home {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .title {
      font-size: 70px;
      letter-spacing: 8px;
      display: flex;
      gap: 5px;
      color: silver;
      text-shadow:
        -2px 0px 5px rgba(255,255,255,0.4),
        2px 0px 10px rgba(200,200,200,0.2);
    }

    .letter {
      opacity: 0;
      transform: translateY(-200px);
      animation: drop 1s forwards;
    }

    @keyframes drop {
      0% {
        opacity: 0;
        transform: translateY(-200px);
      }
      70% {
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* delay per letter */
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.4s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.8s; }
    .l5 { animation-delay: 1.0s; }
    .l6 { animation-delay: 1.2s; }
    .l7 { animation-delay: 1.4s; }
    .l8 { animation-delay: 1.6s; }

    /* ================= SIDE MENU ================= */

    .menu {
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 200px;
      background: #111;
      display: flex;
      flex-direction: column;
      padding-top: 100px;
      box-shadow: -5px 0 20px rgba(255,255,255,0.05);
    }

    .menu button {
      background: none;
      border: none;
      color: white;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .menu button:hover {
      background: #222;
    }

    /* ================= PAGES (FLAP EFFECT) ================= */

    .page {
      position: fixed;
      top: 0;
      right: -100%;
      width: calc(100% - 200px);
      height: 100vh;
      background: #0d0d0d;
      transition: 0.6s ease;
      padding: 40px;
      overflow-y: auto;
    }

    .page.active {
      right: 200px;
    }

    h2 {
      color: silver;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    /* contact */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    .btn {
      padding: 10px 15px;
      background: silver;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<!-- HOME -->
<div class="home">

  <div class="title">
    <span class="letter l1">M</span>
    <span class="letter l2">Y</span>
    <span class="letter l3">R</span>
    <span class="letter l4">A</span>
    <span class="letter l5">A</span>
    <span class="letter l6">R</span>
    <span class="letter l7">T</span>
    <span class="letter l8">S</span>
  </div>

</div>

<!-- SIDE MENU -->
<div class="menu">
  <button onclick="openPage('portfolio')">Portfolio</button>
  <button onclick="openPage('about')">About</button>
  <button onclick="openPage('contact')">Contact</button>
  <button onclick="openPage('payment')">Payment</button>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <h2>Portfolio</h2>

  <h3>Photography</h3>
  <div class="grid">
    <div class="card">Coming soon</div>
  </div>

  <h3>Paintings</h3>
  <div class="grid">
    <div class="card">
      <img src="art1.jpg">
    </div>
    <div class="card">
      <img src="art2.jpg">
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h2>About Me</h2>
  <p>Myra Arts is a creative visual expression of emotions.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/YOUR_ID" method="POST">
    <input type="text" name="name" placeholder="Name">
    <input type="email" name="email" placeholder="Email">
    <textarea name="message" placeholder="Message"></textarea>
    <button class="btn" type="submit">Send</button>
  </form>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Payment</h2>
  <p>Commission or purchase artwork</p>
  <button class="btn">Pay Now</button>
</div>

<script>
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => {
      p.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
